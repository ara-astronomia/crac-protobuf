syntax = "proto3";
import "crac_protobuf/button.proto";

enum CoverMirrorAction {
  COVER_MIRROR_DEFAULT_ACTION = 0;
  OPEN_COVER_MIRROR = 1;
  CLOSE_COVER_MIRROR = 2;
  CHECK_COVER_MIRROR = 3;
}

message CoverMirrorRequest {
  CoverMirrorAction action = 1;
}

enum  CoverMirrorStatus {
  COVER_MIRROR_DEFAULT_STATUS = 0;
  COVER_MIRROR_CLOSED = 1;
  COVER_MIRROR_OPENED = 2;
  COVER_MIRROR_CLOSING = 3;
  COVER_MIRROR_OPENING = 4;

  // danger zone - threat it as a movement statuses
  // (but we hope it has stopped)
  // user should manually reset the steps after checking visually
  // the curtains status
  COVER_MIRROR_DANGER = 5;
  COVER_MIRROR_ERROR = 6;
}

message CoverMirrorResponse {
  CoverMirrorStatus status = 1;
  ButtonGui button_gui = 2;
}

service CoverMirror {
  rpc SetAction(CoverMirrorRequest) returns (CoverMirrorResponse);
}
